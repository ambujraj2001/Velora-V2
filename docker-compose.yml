services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: querymind
      POSTGRES_USER: querymind
      POSTGRES_PASSWORD: querymind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U querymind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
